# Full cloud run (Colab/Kaggle T4). 1-2 reciters, full Quran.
run_name: husary_mujawwad_v1
seed: 42

data:
  reciters:
    - Husary_128kbps_Mujawwad    # slow tajweed — best for diacritics (verified 200)
    - Minshawy_Murattal_128kbps  # faster murattal — adds speed diversity (verified 200)
  audio_dir: data/raw/audio
  text_path: data/raw/text/quran_uthmani.json
  processed_dir: data/processed
  sample_rate: 16000
  surahs: all
  max_duration_sec: 60
  split:
    strategy: by_surah         # cross-speaker lens: switch to by_reciter once 2+ reciters
    test_surahs: [78, 93, 110]
    val_surahs: [94, 109]
    val_frac_within_train: 0.05

model:
  base: facebook/wav2vec2-large-xlsr-53
  vocab_path: data/artifacts/vocab.json
  freeze_feature_encoder_steps: 0
  apply_spec_augment: true

training:
  epochs: 30
  per_device_train_batch_size: 2   # T4 16GB; eff batch = 2*8 = 16
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-4
  warmup_ratio: 0.1
  weight_decay: 0.0
  gradient_checkpointing: true
  fp16: true
  masking_time_prob: 0.05
  eval_steps: 500
  save_steps: 500
  early_stopping_patience: 5

logging:
  hub_repo: null                 # set on Colab: "your-username/quran-asr"
  output_dir: data/artifacts/checkpoints
