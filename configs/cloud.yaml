# Cloud training config (Google Colab). All data/checkpoints live on Google Drive
# so a session disconnect does not lose hours of work.
#
# Kaggle: replace the four /content/drive/MyDrive/quran_asr/... paths below with
# /kaggle/working/quran_asr/... (Kaggle has no Drive; use its output dir instead).
# Make sure "Internet" is ON in the Kaggle notebook settings.

run_name: quran_asr_cloud_v1
seed: 42

data:
  reciters:
    - Husary_128kbps_Mujawwad     # slow tajweed (verified HTTP 200)
    - Minshawy_Murattal_128kbps   # faster murattal, speed diversity (verified 200)
  audio_dir: /content/drive/MyDrive/quran_asr/data/raw/audio
  text_path: /content/drive/MyDrive/quran_asr/data/raw/text/quran_uthmani.json
  processed_dir: /content/drive/MyDrive/quran_asr/data/processed
  sample_rate: 16000
  surahs: all
  max_duration_sec: 60
  split:
    strategy: by_surah            # later: by_reciter for cross-speaker check
    test_surahs: [78, 93, 110]
    val_surahs: [94, 109]
    val_frac_within_train: 0.05

model:
  base: facebook/wav2vec2-large-xlsr-53
  vocab_path: /content/drive/MyDrive/quran_asr/data/artifacts/vocab.json
  apply_spec_augment: true

training:
  epochs: 30
  per_device_train_batch_size: 2   # T4 16GB; eff batch = 2*8 = 16
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-4
  warmup_ratio: 0.1
  weight_decay: 0.0
  gradient_checkpointing: true
  fp16: true
  masking_time_prob: 0.05
  eval_steps: 500
  save_steps: 500
  early_stopping_patience: 5

logging:
  hub_repo: null                   # set AFTER huggingface login, e.g. "your-username/quran-asr"
  output_dir: /content/drive/MyDrive/quran_asr/checkpoints
