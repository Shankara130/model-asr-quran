# Option A — audio + dataset + HF caches on Colab LOCAL disk (/content, ~70 GB,
# EPHEMERAL); only trained checkpoints persist on Google Drive.
#
# Use this when Drive (15 GB) is too small for the audio. On a Colab disconnect
# the audio is lost, but: (a) re-download is ~30 min/reciter, (b) training
# resumes from the Drive checkpoint. For one 3-6h training session this is fine.
#
# IMPORTANT: also run this in the notebook's FIRST cell (before importing HF):
#   import os; os.environ["HF_HOME"] = "/content/hf_cache"
# so the base-model download (~1.2 GB) + the input_values cache (~10 GB) land on
# the big /content partition, not the small ~12 GB root partition.
#
# To shrink audio further (~half), download with: --no-convert  (keeps MP3).

run_name: quran_asr_cloud_v1
seed: 42

data:
  reciters:
    - Husary_128kbps_Mujawwad     # slow tajweed (verified HTTP 200)
    - Minshawy_Murattal_128kbps   # faster murattal, speed diversity (verified 200)
  audio_dir: data/raw/audio
  text_path: data/raw/text/quran_uthmani.json
  processed_dir: data/processed
  sample_rate: 16000
  surahs: all
  max_duration_sec: 60
  split:
    strategy: by_surah            # later: by_reciter for cross-speaker check
    test_surahs: [78, 93, 110]
    val_surahs: [94, 109]
    val_frac_within_train: 0.05

model:
  base: facebook/wav2vec2-large-xlsr-53
  vocab_path: /data/artifacts/vocab.json
  apply_spec_augment: true

training:
  epochs: 30
  per_device_train_batch_size: 2   # T4 16GB; eff batch = 2*8 = 16
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 3.0e-4
  warmup_ratio: 0.1
  weight_decay: 0.0
  gradient_checkpointing: true
  fp16: true
  masking_time_prob: 0.05
  eval_steps: 500
  save_steps: 500
  early_stopping_patience: 5

logging:
  hub_repo: null                   # set AFTER huggingface login, e.g. "your-username/quran-asr"
  output_dir: /content/drive/MyDrive/quran_asr/checkpoints   # <- ONLY this is on Drive
