# LOCAL warm-start SMOKE (M1, CPU): verify the rabah2026 warm-start + staging
# pipeline END-TO-END before spending Colab GPU.
#   - base = rabah2026 (warm-start; head re-init 56 -> 50 via the full vocab)
#   - tiny data: Al-Fatiha (train) + Al-Ikhlas (val)
#   - 2 epochs, auto_stage forces a bootstrap->finetune switch after epoch 1
#   - CPU: fp16 off, no gradient checkpointing, batch 1
# Run:
#   uv run python scripts/build.py --config configs/tiny_warmstart.yaml
#   uv run python scripts/train_manual.py --config configs/tiny_warmstart.yaml
run_name: tiny_warmstart_smoke
seed: 42

data:
  reciters: [Husary_128kbps_Mujawwad]
  audio_dir: data/raw/audio
  text_path: data/raw/text/quran_uthmani.json
  processed_dir: data/processed_tiny_warmstart
  sample_rate: 16000
  surahs: [1, 112]
  max_duration_sec: 60
  split:
    strategy: by_surah
    test_surahs: []          # none held out; this is a pipeline smoke, not an eval
    val_surahs: [112]
    val_frac_within_train: 0.0

model:
  base: rabah2026/wav2vec2-large-xlsr-53-arabic-quran-v_final
  vocab_path: data/artifacts/vocab.json   # full 50-token vocab (head re-init 56 -> 50)
  freeze_feature_encoder_steps: 0
  apply_spec_augment: false

training:
  epochs: 2
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 1
  learning_rate: 1.0e-5
  warmup_ratio: 0.0
  weight_decay: 0.0
  gradient_checkpointing: false   # CPU; skip the overhead
  fp16: false                     # CPU
  masking_time_prob: 0.0
  eval_steps: 500
  save_steps: 500
  early_stopping_patience: 5
  encoder_trainable_layers: 0
  encoder_learning_rate: 1.0e-5
  head_learning_rate: 1.0e-3
  max_grad_norm: 0.5
  best_metric: wer_plain
  greater_is_better: false
  resume_from: none               # fresh smoke each run
  eval_decode_samples: 0
  blank_logit_bias_init: -2.0
  auto_stage: true
  # stage 1: head-only bootstrap (encoder frozen) — forced to switch after epoch 1
  bootstrap_min_epochs: 1
  bootstrap_max_epochs: 1
  bootstrap_empty_threshold: 0.2
  bootstrap_encoder_trainable_layers: 0
  bootstrap_encoder_learning_rate: 1.0e-5
  bootstrap_head_learning_rate: 7.0e-4
  bootstrap_blank_logit_bias_init: -2.0
  bootstrap_apply_spec_augment: false
  # stage 2: unfreeze last encoder layer at tiny lr
  finetune_encoder_trainable_layers: 1
  finetune_encoder_learning_rate: 5.0e-7
  finetune_head_learning_rate: 3.0e-4
  finetune_apply_spec_augment: false

logging:
  hub_repo: null
  output_dir: data/artifacts/checkpoints_tiny_warmstart
