# Cloud WARM-START: fine-tune from the pretrained rabah2026 Quran model
# (wav2vec2-large, CTC, diacritized) instead of from a generic base.
#
# Run with the staging trainer (NOT scripts/train.py):
#   uv run python scripts/train_manual.py --config configs/cloud_warmstart.yaml
#
# WHY WARM-START: rabah2026's encoder already learned Quran acoustics. Pairing it
# with THIS project's vocab + quran.com text lets the model learn our tokenization
# (incl. alef-wasla ٱ, which rabah2026-as-is collapses to ا) for cleaner forced
# alignment on diacritics. The auto-staging curriculum is ideal for warm-start:
#   1) BOOTSTRAP  — train ONLY the fresh CTC head (encoder frozen) so it learns the
#                   project vocab without disturbing the good encoder. A negative
#                   blank-logit bias avoids early all-blank collapse.
#   2) FINETUNE   — once decode is healthy (empty_pred_rate <= threshold), unfreeze
#                   the last N encoder layers at a TINY lr to adapt acoustics to the
#                   project's data without forgetting rabah2026's weights.
#
# HOW (no code change): manual_train loads the base with ignore_mismatched_sizes=True,
# so rabah2026's 56-token head is re-initialized to the project's vocab and only the
# encoder weights transfer.
#
# DATA: everyayah.com (public) via `make download`. 2 reciters for tajweed/speed
# diversity. Switch split to by_reciter (set test_reciter) for the cross-speaker lens.

run_name: quran_asr_warmstart_v1
seed: 42

data:
  reciters:
    - Husary_128kbps_Mujawwad     # slow tajweed — best for diacritics
    - Minshawy_Murattal_128kbps   # faster murattal — speed diversity
  audio_dir: /content/drive/MyDrive/quran_asr/data/raw/audio
  text_path: /content/drive/MyDrive/quran_asr/data/raw/text/quran_uthmani.json
  processed_dir: /content/drive/MyDrive/quran_asr/data/processed
  sample_rate: 16000
  surahs: all
  max_duration_sec: 30            # cap long ayat; large model + batch 2 is VRAM-tight on T4
  split:
    strategy: by_surah            # later: by_reciter (set test_reciter) for cross-speaker
    test_surahs: [78, 93, 110]
    val_surahs: [94, 109]
    val_frac_within_train: 0.05

model:
  base: rabah2026/wav2vec2-large-xlsr-53-arabic-quran-v_final   # <- warm-start source
  vocab_path: /content/drive/MyDrive/quran_asr/data/artifacts/vocab.json
  freeze_feature_encoder_steps: 0
  apply_spec_augment: false       # the staging config overrides this per stage

training:
  epochs: 12                      # warm-start converges faster than from-scratch
  per_device_train_batch_size: 2  # T4 16GB; eff batch = 2*8 = 16 (drop to 1 on OOM)
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 8
  learning_rate: 1.0e-5           # fallback only; staging sets encoder/head lr explicitly
  warmup_ratio: 0.03
  weight_decay: 0.0
  gradient_checkpointing: true
  fp16: true
  masking_time_prob: 0.05
  eval_steps: 500
  save_steps: 500
  early_stopping_patience: 4
  encoder_trainable_layers: 0     # initial; auto_stage overrides per stage
  encoder_learning_rate: 1.0e-5
  head_learning_rate: 1.0e-3
  max_grad_norm: 0.5
  best_metric: wer_plain          # select checkpoint by plain (harakat-stripped) WER
  greater_is_better: false
  resume_from: latest
  eval_decode_samples: 0
  blank_logit_bias_init: -2.0
  auto_stage: true
  # --- stage 1: head-only bootstrap (learn the project vocab, keep encoder frozen) ---
  bootstrap_min_epochs: 3
  bootstrap_max_epochs: 5
  bootstrap_empty_threshold: 0.2
  bootstrap_encoder_trainable_layers: 0
  bootstrap_encoder_learning_rate: 1.0e-5
  bootstrap_head_learning_rate: 7.0e-4
  bootstrap_blank_logit_bias_init: -2.0
  bootstrap_apply_spec_augment: false
  # --- stage 2: unfreeze last encoder layers at a TINY lr (rabah2026 is already tuned) ---
  finetune_encoder_trainable_layers: 2
  finetune_encoder_learning_rate: 5.0e-7
  finetune_head_learning_rate: 3.0e-4
  finetune_apply_spec_augment: false

logging:
  hub_repo: null                  # set after `huggingface-cli login`
  output_dir: /content/drive/MyDrive/quran_asr/checkpoints_warmstart
