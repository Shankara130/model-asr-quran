# Local GPU run - RTX 3050 6GB

run_name: husary_mujawwad_local_3050_small_v1
seed: 42

data:
  reciters:
    - Husary_128kbps_Mujawwad
  audio_dir: data/raw/audio
  text_path: data/raw/text/quran_uthmani.json
  processed_dir: data/processed
  sample_rate: 16000
  surahs: all
  max_duration_sec: 20
  split:
    strategy: by_surah
    test_surahs: [78, 79, 80, 81, 82, 93, 109, 110, 112, 113, 114]
    val_surahs: [88, 89, 90, 91, 92, 94, 95, 96, 97, 98, 99, 100]
    val_frac_within_train: 0.05

model:
  base: facebook/wav2vec2-xls-r-300m
  vocab_path: data/artifacts/vocab.json
  freeze_feature_encoder_steps: 0
  apply_spec_augment: false

training:
  epochs: 10
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.0
  gradient_checkpointing: true
  fp16: true
  masking_time_prob: 0.05
  eval_steps: 500
  save_steps: 500
  early_stopping_patience: 3
  encoder_trainable_layers: 0
  encoder_learning_rate: 1.0e-5
  head_learning_rate: 1.0e-3
  max_grad_norm: 0.5
  best_metric: wer_plain
  greater_is_better: false
  resume_from: latest
  eval_decode_samples: 0
  blank_logit_bias_init: -2.0
  auto_stage: true
  bootstrap_min_epochs: 3
  bootstrap_max_epochs: 4
  bootstrap_empty_threshold: 0.2
  bootstrap_encoder_trainable_layers: 0
  bootstrap_encoder_learning_rate: 1.0e-5
  bootstrap_head_learning_rate: 7.0e-4
  bootstrap_blank_logit_bias_init: -2.0
  bootstrap_apply_spec_augment: false
  finetune_encoder_trainable_layers: 1
  finetune_encoder_learning_rate: 5.0e-7
  finetune_head_learning_rate: 3.0e-4
  finetune_apply_spec_augment: false

logging:
  hub_repo: null
  output_dir: data/artifacts/checkpoints/local_3050_small
