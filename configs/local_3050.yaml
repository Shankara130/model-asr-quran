# Local GPU run - RTX 3050 6GB

run_name: husary_mujawwad_local_3050_small_v1
seed: 42

data:
  reciters:
    - Husary_128kbps_Mujawwad
  audio_dir: data/raw/audio
  text_path: data/raw/text/quran_uthmani.json
  processed_dir: data/processed
  sample_rate: 16000
  surahs: all
  max_duration_sec: 20
  split:
    strategy: by_surah
    test_surahs: [78, 93, 110]
    val_surahs: [94, 109]
    val_frac_within_train: 0.05

model:
  base: facebook/wav2vec2-xls-r-300m
  vocab_path: data/artifacts/vocab.json
  freeze_feature_encoder_steps: 0
  apply_spec_augment: true

training:
  epochs: 30
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 5.0e-5
  warmup_ratio: 0.1
  weight_decay: 0.0
  gradient_checkpointing: true
  fp16: true
  masking_time_prob: 0.05
  eval_steps: 500
  save_steps: 500
  early_stopping_patience: 5

logging:
  hub_repo: null
  output_dir: data/artifacts/checkpoints/local_3050_small
