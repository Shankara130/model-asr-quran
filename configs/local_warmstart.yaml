# LOCAL GPU WARM-START: fine-tune from rabah2026 on a local CUDA GPU
# (e.g. RTX 3050 6GB / 3060). NOT for the M1 Mac — wav2vec2-large training on
# CPU/MPS is far too slow; use this on a machine with NVIDIA CUDA.
#
# Mirrors local_3050.yaml's proven 6GB staging settings; only the base changes to
# rabah2026 (warm-start). Run with the staging trainer:
#   uv run python scripts/train_manual.py --config configs/local_warmstart.yaml
# For FROM-SCRATCH (no warm-start) on the same box, use configs/local_3050.yaml.

run_name: local_warmstart_cer_bootstrap_v2
seed: 42

data:
  reciters:
    - Husary_128kbps_Mujawwad
  audio_dir: data/raw/audio
  text_path: data/raw/text/quran_uthmani.json
  processed_dir: data/processed
  sample_rate: 16000
  surahs: all
  max_duration_sec: 20              # cap long ayat; large model + batch 1 is VRAM-tight at 6GB
  split:
    strategy: by_surah
    test_surahs: [78, 79, 80, 81, 82, 93, 109, 110, 112, 113, 114]
    val_surahs: [88, 89, 90, 91, 92, 94, 95, 96, 97, 98, 99, 100]
    val_frac_within_train: 0.05

model:
  base: rabah2026/wav2vec2-large-xlsr-53-arabic-quran-v_final   # <- warm-start source
  vocab_path: data/artifacts/vocab.json
  freeze_feature_encoder_steps: 0
  apply_spec_augment: false       # staging overrides this per stage

training:
  epochs: 15
  per_device_train_batch_size: 1  # 6GB VRAM; eff batch = 1*16 = 16
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 16
  learning_rate: 1.0e-5
  warmup_ratio: 0.03
  weight_decay: 0.0
  gradient_checkpointing: true    # required to fit large model in 6GB
  fp16: true
  masking_time_prob: 0.05
  eval_steps: 500
  save_steps: 500
  early_stopping_patience: 5
  encoder_trainable_layers: 0
  encoder_learning_rate: 1.0e-5
  head_learning_rate: 1.0e-3
  max_grad_norm: 0.5
  best_metric: cer_plain
  greater_is_better: false
  resume_from: latest
  eval_decode_samples: 0
  blank_logit_bias_init: -2.0
  auto_stage: true
  # stage 1: head-only bootstrap (encoder frozen) — learn the project vocab
  bootstrap_min_epochs: 5
  bootstrap_max_epochs: 8
  bootstrap_empty_threshold: 0.05
  bootstrap_encoder_trainable_layers: 0
  bootstrap_encoder_learning_rate: 1.0e-5
  bootstrap_head_learning_rate: 1.0e-3
  bootstrap_blank_logit_bias_init: -2.0
  bootstrap_apply_spec_augment: false
  # stage 2: unfreeze last encoder layer at tiny lr (rabah2026 is already tuned)
  finetune_encoder_trainable_layers: 1
  finetune_encoder_learning_rate: 2.0e-7
  finetune_head_learning_rate: 2.0e-4
  finetune_apply_spec_augment: false

logging:
  hub_repo: null                  # set + export HF_TOKEN to push to the Hub
  output_dir: data/artifacts/checkpoints/local_warmstart_cer_bootstrap_v2
    